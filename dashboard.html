{% extends 'base.html' %}
{% block title %}Entrar — IFMT Carteirinha{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="auth-card">
      <div class="text-center mb-4">
        <div class="auth-icon"><i class="bi bi-person-circle"></i></div>
        <h4 class="fw-bold mt-2">Entrar no sistema</h4>
        <p class="text-muted small">Use seu e-mail e senha cadastrados</p>
      </div>
      <form method="POST" novalidate>
        <div class="mb-3">
          <label class="form-label fw-semibold">E-mail</label>
          <input type="email" name="email" class="form-control form-control-lg"
                 placeholder="seu@email.com" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Senha</label>
          <div class="input-group">
            <input type="password" name="password" id="pwdInput"
                   class="form-control form-control-lg" placeholder="••••••" required>
            <button class="btn btn-outline-secondary" type="button"
                    onclick="togglePwd()"><i class="bi bi-eye" id="pwdIcon"></i></button>
          </div>
        </div>
        <button type="submit" class="btn btn-ifmt btn-lg w-100">
          <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
        </button>
      </form>
      <hr class="my-4">
      <p class="text-center text-muted small">
        Ainda não tem conta?
        <a href="{{ url_for('register') }}" class="text-success fw-bold">Cadastre-se grátis</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function togglePwd(){
  const i = document.getElementById('pwdInput');
  const ic = document.getElementById('pwdIcon');
  i.type = i.type === 'password' ? 'text' : 'password';
  ic.className = i.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
{% endblock %}
